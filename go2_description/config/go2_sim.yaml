controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    go2_actuator:
      type: go2_actuator/Go2Actuator

    go2_lowstates:
      type: go2_lowstates/Go2Lowstates
  
    go2_jointcontroller:
      type: go2_jointcontroller/Go2JointController

go2_actuator:
  ros__parameters:
    joints:

      - FL_hip_joint
      - FL_thigh_joint
      - FL_calf_joint
      - FR_hip_joint
      - FR_thigh_joint
      - FR_calf_joint
      - RL_hip_joint
      - RL_thigh_joint
      - RL_calf_joint
      - RR_hip_joint
      - RR_thigh_joint
      - RR_calf_joint

    command_interfaces: 
      - effort
    
    state_interfaces:
      - position
      - velocity
      - effort

    gain:
      Kp: 60.0
      Kd: 5.0

    up_rate: 1000.0
          
    joints_references: [ 0.0, 1.36, -2.65, 0.0, 1.36, -2.65, -0.2, 1.36, -2.65, 0.2, 1.36, -2.65]

go2_lowstates:
  ros__parameters:
    joints:
     
      - FL_hip_joint
      - FL_thigh_joint
      - FL_calf_joint
      - FR_hip_joint
      - FR_thigh_joint
      - FR_calf_joint
      - RL_hip_joint
      - RL_thigh_joint
      - RL_calf_joint
      - RR_hip_joint
      - RR_thigh_joint
      - RR_calf_joint


    state_interfaces:
      - position
      - velocity

    up_rate: 1000.0

go2_jointcontroller:
  ros__parameters:
    joints:

      - FL_hip_joint
      - FL_thigh_joint
      - FL_calf_joint
      - FR_hip_joint
      - FR_thigh_joint
      - FR_calf_joint
      - RL_hip_joint
      - RL_thigh_joint
      - RL_calf_joint
      - RR_hip_joint
      - RR_thigh_joint
      - RR_calf_joint

    up_rate: 250.0

    gain:
      Kp: 60.0
      Kd: 5.0

      # - FR_hip_joint
      # - FR_thigh_joint
      # - FR_calf_joint
      # - FL_hip_joint
      # - FL_thigh_joint
      # - FL_calf_joint
      # - RL_hip_joint
      # - RL_thigh_joint
      # - RL_calf_joint
      # - RR_hip_joint
      # - RR_thigh_joint
      # - RR_calf_joint