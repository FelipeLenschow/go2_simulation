controller_manager:
  ros__parameters:
    update_rate: 500  # Hz

    go2_actuator:
      type: go2_actuator/Go2Actuator

    go2_lowstates:
      type: go2_lowstates/Go2Lowstates
  
    go2_jointcontroller:
      type: go2_jointcontroller/Go2JointController

go2_actuator:
  ros__parameters:
    update_rate: 500

    joints:
      names:
        - FR_hip_joint
        - FR_thigh_joint
        - FR_calf_joint
        - FL_hip_joint
        - FL_thigh_joint
        - FL_calf_joint
        - RR_hip_joint
        - RR_thigh_joint
        - RR_calf_joint
        - RL_hip_joint
        - RL_thigh_joint
        - RL_calf_joint

    command_interfaces: 
      - effort
    
    state_interfaces:
      - position
      - velocity
      - effort

go2_lowstates:
  ros__parameters:
    update_rate: 500
    
    joints:     
      - FR_hip_joint
      - FR_thigh_joint
      - FR_calf_joint
      - FL_hip_joint
      - FL_thigh_joint
      - FL_calf_joint
      - RR_hip_joint
      - RR_thigh_joint
      - RR_calf_joint
      - RL_hip_joint
      - RL_thigh_joint
      - RL_calf_joint

    state_interfaces:
      - position
      - velocity

go2_jointcontroller:
  ros__parameters:
    update_rate: 200

    control_mode: 1
    
    joints:
      names:
        - FR_hip_joint
        - FR_thigh_joint
        - FR_calf_joint
        - FL_hip_joint
        - FL_thigh_joint
        - FL_calf_joint
        - RR_hip_joint
        - RR_thigh_joint
        - RR_calf_joint
        - RL_hip_joint
        - RL_thigh_joint
        - RL_calf_joint
      
      initpos: [0.0, 1.50, -2.65, 0.0, 1.50, -2.65, 0.0, 1.50, -2.65, 0.0, 1.50, -2.65] # fold position

    gain:
      PD:
        Kp: [50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0]
        Kd: [0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7]
      PDG:
        Kp: [50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0]
        Kd: [0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7]
      PID:
        Kp: [50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0]
        Kd: [0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7]
        Ki: [45.0, 25.0, 0.0, 45.0, 25.0, 0.0, 45.0, 25.0, 0.0, 45.0, 25.0, 0.0]
      PIDG:
        Kp: [50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0]
        Kd: [0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7]
        Ki: [45.0, 25.0, 0.0, 45.0, 25.0, 0.0, 45.0, 25.0, 0.0, 45.0, 25.0, 0.0]