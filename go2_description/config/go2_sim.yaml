controller_manager:
  ros__parameters:
    update_rate: 500  # Hz

    go2_actuator:
      type: go2_actuator/Go2Actuator

    go2_lowstates:
      type: go2_lowstates/Go2Lowstates
  
    go2_jointcontroller:
      type: go2_jointcontroller/Go2JointController

go2_actuator:
  ros__parameters:
    update_rate: 500

    joints:
      names:
        - 1_FR_hip_joint
        - 1_FR_thigh_joint
        - 1_FR_calf_joint
        - 2_FL_hip_joint
        - 2_FL_thigh_joint
        - 2_FL_calf_joint
        - 3_RR_hip_joint
        - 3_RR_thigh_joint
        - 3_RR_calf_joint
        - 4_RL_hip_joint
        - 4_RL_thigh_joint
        - 4_RL_calf_joint

    command_interfaces: 
      - effort
    
    state_interfaces:
      - position
      - velocity
      - effort

go2_lowstates:
  ros__parameters:
    update_rate: 500
    
    joints:     
      - 1_FR_hip_joint
      - 1_FR_thigh_joint
      - 1_FR_calf_joint
      - 2_FL_hip_joint
      - 2_FL_thigh_joint
      - 2_FL_calf_joint
      - 3_RR_hip_joint
      - 3_RR_thigh_joint
      - 3_RR_calf_joint
      - 4_RL_hip_joint
      - 4_RL_thigh_joint
      - 4_RL_calf_joint

    state_interfaces:
      - position
      - velocity
      - effort

go2_jointcontroller:
  ros__parameters:
    update_rate: 250

    simulation: true
    network_interface: eth0
    control_mode: 1
    
    joints:
      initpos: [0.0, 1.50, -2.65, 0.0, 1.50, -2.65, 0.0, 1.50, -2.65, 0.0, 1.50, -2.65] # fold position

    gain:
      PD:
        Kp: [10.0, 10.0, 4.0, 10.0, 10.0, 4.0, 10.0, 10.0, 4.0, 10.0, 10.0, 4.0]
        Kd: [0.5, 0.5, 0.2, 0.5, 0.5, 0.2, 0.5, 0.5, 0.2, 0.5, 0.5, 0.2]
      PDG:
        Kp: [10.0, 10.0, 4.0, 10.0, 10.0, 4.0, 10.0, 10.0, 4.0, 10.0, 10.0, 4.0]
        Kd: [0.5, 0.5, 0.2, 0.5, 0.5, 0.2, 0.5, 0.5, 0.2, 0.5, 0.5, 0.2]
      PID:
        Kp: [10.0, 10.0, 4.0, 10.0, 10.0, 4.0, 10.0, 10.0, 4.0, 10.0, 10.0, 4.0]
        Kd: [0.5, 0.5, 0.2, 0.5, 0.5, 0.2, 0.5, 0.5, 0.2, 0.5, 0.5, 0.2]
        Ki: [5.0, 5.0, 2.0, 5.0, 5.0, 2.0, 5.0, 5.0, 2.0, 5.0, 5.0, 2.0]
      PIDG:
        Kp: [10.0, 10.0, 4.0, 10.0, 10.0, 4.0, 10.0, 10.0, 4.0, 10.0, 10.0, 4.0]
        Kd: [0.5, 0.5, 0.2, 0.5, 0.5, 0.2, 0.5, 0.5, 0.2, 0.5, 0.5, 0.2]
        Ki: [5.0, 5.0, 2.0, 5.0, 5.0, 2.0, 5.0, 5.0, 2.0, 5.0, 5.0, 2.0]