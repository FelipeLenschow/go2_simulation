controller_manager:
  ros__parameters:
    update_rate: 500  # Hz

    go2_lowstates:
      type: go2_lowstates/Go2Lowstates
  
    go2_jointcontroller:
      type: go2_jointcontroller/Go2JointController


go2_jointcontroller:
  ros__parameters:
    update_rate: 500

    simulation: false
    network_interface: enp2s0
    control_mode: 2

    joints:
      initpos: [0.0, 1.50, -2.65, 0.0, 1.50, -2.65, 0.0, 1.50, -2.65, 0.0, 1.50, -2.65] # fold position

    gain:
      PD:
        Kp: [10.0, 10.0, 4.0, 10.0, 10.0, 4.0, 10.0, 10.0, 4.0, 10.0, 10.0, 4.0]
        Kd: [0.5, 0.5, 0.2, 0.5, 0.5, 0.2, 0.5, 0.5, 0.2, 0.5, 0.5, 0.2]
      PDG:
        Kp: [10.0, 10.0, 4.0, 10.0, 10.0, 4.0, 10.0, 10.0, 4.0, 10.0, 10.0, 4.0]
        Kd: [0.5, 0.5, 0.2, 0.5, 0.5, 0.2, 0.5, 0.5, 0.2, 0.5, 0.5, 0.2]
      PID:
        Kp: [10.0, 10.0, 4.0, 10.0, 10.0, 4.0, 10.0, 10.0, 4.0, 10.0, 10.0, 4.0]
        Kd: [0.5, 0.5, 0.2, 0.5, 0.5, 0.2, 0.5, 0.5, 0.2, 0.5, 0.5, 0.2]
        Ki: [5.0, 5.0, 2.0, 5.0, 5.0, 2.0, 5.0, 5.0, 2.0, 5.0, 5.0, 2.0]
      PIDG:
        Kp: [10.0, 10.0, 4.0, 10.0, 10.0, 4.0, 10.0, 10.0, 4.0, 10.0, 10.0, 4.0]
        Kd: [0.5, 0.5, 0.2, 0.5, 0.5, 0.2, 0.5, 0.5, 0.2, 0.5, 0.5, 0.2]
        Ki: [5.0, 5.0, 2.0, 5.0, 5.0, 2.0, 5.0, 5.0, 2.0, 5.0, 5.0, 2.0]