controller_manager:
  ros__parameters:
    update_rate: 200  # Hz

    go2_lowstates:
      type: go2_lowstates/Go2Lowstates
  
    go2_jointcontroller:
      type: go2_jointcontroller/Go2JointController


go2_jointcontroller:
  ros__parameters:
    update_rate: 200

    control_mode: 1

    joints:
      names:
        - FL_hip_joint
        - FL_thigh_joint
        - FL_calf_joint
        - FR_hip_joint
        - FR_thigh_joint
        - FR_calf_joint
        - RL_hip_joint
        - RL_thigh_joint
        - RL_calf_joint
        - RR_hip_joint
        - RR_thigh_joint
        - RR_calf_joint

      initpos: [0.0, 1.50, -2.65, 0.0, 1.50, -2.65, -0.2, 1.36, -2.65, 0.2, 1.36, -2.65] # fold position

    gain:
      PD:
        Kp: [50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0]
        Kd: [0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7]
      PID:
        Kp: [50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0]
        Kd: [0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7, 0.7]
        Ki: [45.0, 25.0, 0.0, 45.0, 25.0, 0.0, 45.0, 25.0, 0.0, 45.0, 25.0, 0.0]

